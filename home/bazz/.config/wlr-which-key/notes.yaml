font: Adwaita Sans, Symbols Nerd Font Mono 13
background: "#100F0F"
color: "#CECDC3"
border: "#1C1B1A"
separator: " ➜ "
border_width: 1
corner_r: 4
padding: 20
rows_per_column: 2
column_padding: 25

anchor: top
margin_right: 16
margin_bottom: 16
margin_left: 16
margin_top: 16

inhibit_compositor_keyboard_shortcuts: true
auto_kbd_layout: true

menu:
  - key: "s"
    desc: 󰍉 Search
    cmd: fuzzel_notes -s
  - key: "n"
    desc: 󰎚 New Note
    cmd: fuzzel_notes -c
  - key: "t"
    desc:  TODO
    cmd: footclient -a noteterm -T Notes sh -c "cd ~/Documents/personal/notes/ && nvim todo.md"
  - key: "d"
    desc: 󰩹 Delete
    cmd: fuzzel_notes -d

font: Adwaita Sans, Symbols Nerd Font Mono 13
background: "#100F0F"
color: "#CECDC3"
border: "#282726"
separator: " ➜ "
border_width: 1
corner_r: 4
padding: 20

anchor: top-right
margin_right: 16
margin_bottom: 16
margin_left: 16
margin_top: 16

inhibit_compositor_keyboard_shortcuts: true
auto_kbd_layout: true

menu:
  - key: "n"
    desc: 󰎚 Notes
    cmd: footclient -a noteterm -T Notes -e nvim -p ~/Documents/personal/notes/index.md
  - key: "t"
    desc:  TODO
    cmd: footclient -a noteterm -T Todo -e nvim -p ~/Documents/personal/notes/todo.md

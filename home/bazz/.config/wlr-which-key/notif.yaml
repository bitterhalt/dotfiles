font: Adwaita Sans, Symbols Nerd Font Mono 13
background: "#100F0F"
color: "#CECDC3"
border: "#282726"
separator: " ➜ "
border_width: 1
corner_r: 4
padding: 20

anchor: top
margin_right: 8
margin_bottom: 8
margin_left: 8
margin_top: 8

inhibit_compositor_keyboard_shortcuts: true
auto_kbd_layout: true

menu:
  - key: "d"
    desc: 󰂛  DND
    cmd: makoctl mode -t dnd && pkill -SIGRTMIN+3 waybar
  - key: "r"
    desc: 󰦛  Restore Notification(s)
    keep_open: true
    cmd: makoctl restore

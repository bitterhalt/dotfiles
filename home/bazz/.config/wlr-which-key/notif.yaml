font: Adwaita Sans, Symbols Nerd Font Mono 13
background: "#100F0F"
color: "#CECDC3"
border: "#282726"
separator: " ➜ "
border_width: 1
corner_r: 4
padding: 20

anchor: top-right
margin_right: 16
margin_bottom: 16
margin_left: 16
margin_top: 16

inhibit_compositor_keyboard_shortcuts: true
auto_kbd_layout: true

menu:
  - key: "d"
    desc: 󰂛  DND
    cmd: makoctl mode -t dnd && pkill -SIGRTMIN+3 waybar
  - key: "h"
    desc: 󰦛  Show history
    cmd: foot -T "Mako History" -e mako_hist.sh
  - key: "c"
    desc: 󰎟  Clear all
    keep_open: true
    cmd: makoctl dismiss -a

font: Adwaita Mono 13
background: "#101010"
color: "#CCCCCC"
border: "#1C1C1C"
separator: " ➜ "
border_width: 1
corner_r: 4
padding: 20
rows_per_column: 2
column_padding: 25

anchor: top
margin_right: 16
margin_bottom: 16
margin_left: 16
margin_top: 16

inhibit_compositor_keyboard_shortcuts: true
auto_kbd_layout: true

menu:
  - key: "i"
    desc: Install
    cmd: foot -a pacseek -T pacseek -e pacseek
  - key: "u"
    desc: Update
    cmd: foot -a pop-upgrade -e popupgrade

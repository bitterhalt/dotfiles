font: Adwaita Sans 13
background: "#100F0F"
color: "#CECDC3"
border: "#282726"
separator: " ➜ "
border_width: 1
corner_r: 4
padding: 20

anchor: top-right
margin_right: 8
margin_bottom: 8
margin_left: 8
margin_top: 8

inhibit_compositor_keyboard_shortcuts: true
auto_kbd_layout: true

menu:
  - key: "i"
    desc: Install
    cmd: foot -a pacseek -T pacseek -e pacseek
  - key: "u"
    desc: Update
    cmd: foot -a pop-upgrade -e popupgrade

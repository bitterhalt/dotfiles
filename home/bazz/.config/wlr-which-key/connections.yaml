font: Adwaita Sans, Symbols Nerd Font Mono 13
background: "#100F0F"
color: "#CECDC3"
border: "#282726"
separator: " ➜ "
border_width: 1
corner_r: 4
padding: 20

anchor: top-right
margin_right: 8
margin_bottom: 8
margin_left: 8
margin_top: 8

inhibit_compositor_keyboard_shortcuts: true
auto_kbd_layout: true

menu:
  - key: "a"
    desc: 󰓃 Audio devices
    cmd: fuzzel_sound
  - key: "w"
    desc: 󰖩 Wi-Fi
    cmd: fuzzel_wifi
  - key: "b"
    desc: 󰂯 Bluetooth [Fuzzel]
    cmd: fuzzel_bt
  - key: "t"
    desc: 󰂯 Bluetooth [Bluetui]
    cmd: foot -a bluetui -e bluetui

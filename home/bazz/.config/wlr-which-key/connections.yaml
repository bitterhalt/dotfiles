font: Adwaita Mono, Symbols Nerd Font Mono 13
background: "#101010"
color: "#CCCCCC"
border: "#1C1C1C"
separator: " ➜ "
border_width: 1
corner_r: 4
padding: 20
rows_per_column: 2
column_padding: 25

anchor: top
margin_right: 16
margin_bottom: 16
margin_left: 16
margin_top: 16

inhibit_compositor_keyboard_shortcuts: true
auto_kbd_layout: true

menu:
  - key: "a"
    desc: 󰓃 Audio devices
    cmd: fuzzel_sound
  - key: "b"
    desc: 󰂯 Bluetooth [Bluetui]
    cmd: foot -a bluetui -e bluetui
  - key: "w"
    desc: 󰖩 Wi-Fi (Impala)
    cmd: foot -a impala -e impala
  - key: "n"
    desc: 󰲝 Network Manager
    cmd: nm-connection-editor

font: Adwaita Sans, Symbols Nerd Font Mono 13
background: "#100F0F"
color: "#CECDC3"
border: "#af3029"
separator: " ➜ "
border_width: 1
corner_r: 4
padding: 20
column_padding: 25

anchor: top-right
margin_right: 16
margin_bottom: 16
margin_left: 16
margin_top: 16

inhibit_compositor_keyboard_shortcuts: true
auto_kbd_layout: true

menu:
  - key: "l"
    desc: Lock
    cmd: swaylock
  - key: "e"
    desc: Logout
    cmd: niri msg action quit --skip-confirmation
  - key: "z"
    desc: Sleep 💤
    cmd: systemctl suspend
  - key: "s"
    desc: Shutdown
    cmd: systemctl poweroff
  - key: "r"
    desc: Reboot
    cmd: systemctl reboot
  - key: "k"
    desc: Kill process 💀
    cmd: fuzzel_killer

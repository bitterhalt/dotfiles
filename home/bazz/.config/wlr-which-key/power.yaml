font: Adwaita Mono, Symbols Nerd Font Mono 13
background: "#100F0F"
color: "#CECDC3"
border: "#af3029"
separator: " ➜ "
border_width: 1
corner_r: 4
padding: 20
rows_per_column: 3
column_padding: 25

anchor: top
margin_right: 16
margin_bottom: 16
margin_left: 16
margin_top: 16

inhibit_compositor_keyboard_shortcuts: true
auto_kbd_layout: true

menu:
  - key: "l"
    desc: Lock
    cmd: swaylock
  - key: "e"
    desc: Logout
    cmd: niri msg action quit
  - key: "z"
    desc: Sleep 💤
    cmd: systemctl suspend
  - key: "S"
    desc: Shutdown
    cmd: systemctl poweroff
  - key: "R"
    desc: Reboot
    cmd: systemctl reboot
  - key: "U"
    desc: Reboot UEFI
    cmd: systemctl reboot --firmware-setup

font: Adwaita Mono 13
background: "#100F0F"
color: "#CECDC3"
border: "#24837B"
separator: " ➜ "
border_width: 2
corner_r: 4
padding: 20

anchor: top
margin_right: 8
margin_bottom: 8
margin_left: 8
margin_top: 8

inhibit_compositor_keyboard_shortcuts: true
auto_kbd_layout: true

menu:
  - key: "r"
    desc: Reload
    cmd: ignis-start.sh
  - key: "s"
    desc: Stop
    cmd: ignis-start.sh stop

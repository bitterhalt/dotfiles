font: Adwaita Sans 13
background: "#100F0F"
color: "#CECDC3"
border: "#282726"
separator: " ➜ "
border_width: 1
corner_r: 4
padding: 20

anchor: top-right
margin_right: 8
margin_bottom: 8
margin_left: 8
margin_top: 8

inhibit_compositor_keyboard_shortcuts: true
auto_kbd_layout: true

menu:
  - key: "a"
    desc: All
    cmd: zen-browser|discord|thunderbird|transmission-gtk
  - key: "b"
    desc: Browser
    cmd: zen-browser
  - key: "d"
    desc: Discord
    cmd: discord
  - key: "m"
    desc: Email
    cmd: thunderbird
  - key: "t"
    desc: Torrent
    cmd: transmission-gtk
  - key: "g"
    desc: Gaming
    submenu:
      - key: "a"
        desc: "All"
        cmd: steam|lutris
      - key: "s"
        desc: Steam
        cmd: steam
      - key: "l"
        desc: Lutris
        cmd: lutris

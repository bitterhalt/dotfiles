font: Adwaita Sans 13
background: "#100F0F"
color: "#CECDC3"
border: "#282726"
separator: " ➜ "
border_width: 1
corner_r: 4
padding: 20
column_padding: 25

anchor: top
margin_right: 8
margin_bottom: 8
margin_left: 8
margin_top: 8

inhibit_compositor_keyboard_shortcuts: true
auto_kbd_layout: true

menu:
  - key: "f"
    desc: Foot
    cmd: foot -e nvim ~/.config/foot/foot.ini
  - key: "d"
    desc: Fuzzel
    cmd: foot -e nvim ~/.config/fuzzel/fuzzel.ini
  - key: "i"
    desc: Ignis
    cmd: exec foot sh -c "cd ~/.config/ignis && vopen ."
  - key: "v"
    desc: Neovim
    cmd: exec foot sh -c "cd ~/.config/nvim && vopen ."
  - key: "n"
    desc: Niri
    cmd: exec foot sh -c "cd ~/.config/niri && vopen ."

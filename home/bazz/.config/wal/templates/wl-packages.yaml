font: Adwaita Mono, Symbols Nerd Font Mono 13
background: "{background}"
color: "{foreground}"
border: "{color6}"
separator: " ➜ "
border_width: 1
corner_r: 4
padding: 25
column_padding: 25

anchor: top
margin_right: 16
margin_bottom: 16
margin_left: 16
margin_top: 16

inhibit_compositor_keyboard_shortcuts: true
auto_kbd_layout: true

menu:
  - key: "i"
    desc: Install
    cmd: foot -a pacseek -T pacseek -e pacseek -m
  - key: "u"
    desc: Update
    cmd: foot -a pop-upgrade -e sys_upgrade

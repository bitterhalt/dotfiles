env:

  TERM: xterm-256color

window:
  padding:
    x: 5
    y: 5

  # Window title
  title: Alacritty
  class:
    # Application instance name
    instance: Alacritty
    # General application class
    general: Alacritty

scrolling:
  history: 1000

# Font configuration
font:
  normal:
    family: Iosevka Nerd Font
    style: Regular
  # Point size
  size: 10.0

draw_bold_text_with_bright_colors: false

# Theme
import:
  - ~/.config/alacritty/themes/doom-vibrant.yml

selection:
  #semantic_escape_chars: ",│`|:\"' ()[]{}<>\t"

  # When set to `true`, selected text will be copied to the primary clipboard.
  save_to_clipboard: false

cursor:
  #   - ▇ Block
  #   - _ Underline
  #   - | Beam
  style: Block

key_bindings:
  - { key: Return, mods: Control|Shift, action: SpawnNewInstance }


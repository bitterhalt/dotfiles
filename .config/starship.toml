add_newline = false
format = """
$os\
$directory\
$git_branch\
$git_status\
$character\
$cmd_duration"""

right_format = "$time"

[character]
success_symbol = "[вқҜ](green)"
error_symbol = "[вқҜ](red)"

[directory]
format = "[$path]($style)(bold blue)[$read_only](bold red)($read_only_style) "
truncation_length = 3
truncation_symbol = 'вҖҰ/'
home_symbol = " ~"
read_only = " пҖЈ"

[time]
format = "[$time]($style)"
disabled = false
style = "grey"

[os]
disabled = false

[os.symbols]
Android = "п…» "
Arch = "пҢғ "
CentOS = "пҢ„ "
Debian = "пҢҶ "
Emscripten = "пҲ… "
EndeavourOS = "пҶ— "
Fedora = "пҢҠ "
FreeBSD = "пҢҢ "
Gentoo = "пҢҚ "
HardenedBSD = "пІҠ "
Linux = "пҢҡ "
Macos = "пҢӮ "
Manjaro = "пҢ’ "
Mint = "пҢҺ "
NetBSD = "пҖӨ "
NixOS = "пҢ“ "
openSUSE = "пҢ” "
Pop = "пҢӘ "
Redhat = "пҢ– "
RedHatEnterprise = "пҢ– "
Redox = "п”— "
SUSE = "пҢ” "
Ubuntu = "пҢӣ "
Unknown = "пҲӯ "

[git_branch]
style = "bold #7C83FD"

[git_metrics]
disabled = false

[git_status]
ahead = " вҮЎ ${count}"
diverged = "вҮ• вҮЎ ${ahead_count} вҮЈ ${behind_count}"
behind = "вҮЈ ${count}"
format = '([\[$all_status$ahead_behind\]]($style) )'
style = "#ff00dd"

[cmd_duration]
disabled = false
format = "[$duration]($style) "
style = "yellow"
